<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>مسجد · شفافية تامة · زجاج نقي</title>
  <style>
    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width:100%; height:100%; overflow: hidden; font-family: "Segoe UI", system-ui, -apple-system, sans-serif; background: #000; }

    /* ===== خلفية غنية ===== */
    #bg-full {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse at 30% 40%, rgba(200,170,100,0.4) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 70%, rgba(120,180,230,0.3) 0%, transparent 65%),
                  linear-gradient(145deg, #0a0f1a 0%, #1a2540 60%, #0f1a2a 100%);
    }
    #bg-image {
      position: fixed; inset: 0; z-index: 1;
      /* ✅ فارغ (بدون معاينة) — سيتم ضبطه لاحقاً من API */
      background-image: none;
      background-size: cover; background-position: center 30%;
      opacity: 0; filter: brightness(0.75) saturate(1.3) contrast(1.1);
    }
    #bg-overlay {
      position: fixed; inset: 0; z-index: 2;
      background: radial-gradient(circle at 50% 50%, transparent 30%, rgba(0,0,0,0.3) 90%);
      pointer-events: none;
    }

    /* ===== البطاقات الزجاجية – شفافة تماماً ===== */
    .glass {
      background: transparent !important;
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(4px) saturate(200%);
      -webkit-backdrop-filter: blur(4px) saturate(200%);
      border-radius: 28px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      position: relative;
      overflow: hidden;
    }

    .glass, .glass * {
      text-shadow: 0 2px 12px rgba(0,0,0,0.8), 0 4px 20px black;
    }

    /* ===== المتغيرات والثوابت ===== */
    :root {
      --safe: clamp(8px, 2vw, 24px);
      --headerH: clamp(80px, 10vh, 140px);
      --verseH: clamp(44px, 5.5vh, 80px);
      --tickerH: clamp(48px, 6vh, 90px);
      --clockSize: clamp(48px, 6.5vw, 112px);
      --daySize: clamp(14px, 1.5vw, 26px);
      --citySize: clamp(16px, 1.8vw, 32px);
      --nextName: clamp(32px, 4vw, 70px);
      --countSize: clamp(20px, 2.8vw, 52px);
      --rowName: clamp(20px, 2.4vw, 40px);
      --rowTime: clamp(18px, 2.2vw, 38px);
      --badgeSize: clamp(12px, 1.2vw, 16px);
      --accent: #f8df9c;
    }

    /* ===== الشبكة الرئيسية ===== */
    #app {
      position: relative; z-index: 10;
      height: 100vh; padding: var(--safe);
      display: grid;
      grid-template-rows: var(--headerH) var(--verseH) 1fr var(--tickerH);
      gap: var(--safe);
      min-height: 0;
    }

    /* ----- الرأس ----- */
    #header {
      display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
      gap: clamp(8px, 1.2vw, 20px); padding: clamp(8px, 1.4vw, 18px);
    }
    #city-name { font-size: var(--citySize); color: #fff; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: start; }
    #clock-wrap { display: flex; align-items: baseline; justify-content: center; direction: ltr; gap: 0.1em; }
    #time-hm, #time-s { font-size: var(--clockSize); font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1; color: var(--accent); text-shadow: 0 0 30px #ffdcaa, 0 4px 20px black; letter-spacing: 0.04em; white-space: nowrap; }
    #time-s { opacity: 0.9; }
    #header-date { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; overflow: hidden; }
    #day-name { font-size: var(--daySize); font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #date-line { font-size: var(--daySize); color: rgba(255,255,240,0.95); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ----- شريط الآية ----- */
    #verse-bar { display: flex; align-items: center; gap: 12px; padding: 0 14px; }
    #verse-badge { flex: 0 0 auto; font-size: var(--badgeSize); font-weight: 800; padding: 4px 14px; border-radius: 40px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,215,140,0.25); color: #fff5dd; white-space: nowrap; backdrop-filter: blur(4px); }
    #verse-wrap { position: relative; flex: 1 1 auto; overflow: hidden; mask-image: linear-gradient(to left, transparent 0%, #000 8%, #000 92%, transparent 100%); -webkit-mask-image: linear-gradient(to left, transparent 0%, #000 8%, #000 92%, transparent 100%); }
    #verse-text { display: inline-block; white-space: nowrap; font-size: clamp(14px, 1.8vw, 26px); color: #fffcf0; padding-inline: 20px; animation: verse-scroll-rtl 36s linear infinite; }
    @keyframes verse-scroll-rtl { from { transform: translateX(-100%); } to { transform: translateX(100%); } }
    #verse-text.ltr { animation-name: verse-scroll-ltr; direction: ltr; }
    @keyframes verse-scroll-ltr { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    #verse-text.paused { animation-play-state: paused; }

    /* ----- المحتوى الرئيسي ----- */
    #main { min-height: 0; display: grid; grid-template-columns: 0.9fr 1.3fr; gap: var(--safe); }
    @media (max-aspect-ratio: 4/3) { #main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; } }

    /* بطاقة الصلاة القادمة */
    #next-card { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: clamp(6px, 1vh, 14px); padding: clamp(14px, 2.5vh, 30px); text-align: center; }
    #phase-badge { font-size: var(--badgeSize); font-weight: 700; padding: 5px 18px; border-radius: 40px; background: rgba(0,0,0,0.25); border: 1px solid rgba(255,210,120,0.3); color: #ffefcf; white-space: nowrap; backdrop-filter: blur(4px); }
    #next-label { font-size: clamp(12px, 1.2vw, 18px); color: rgba(255,250,220,0.95); font-weight: 600; letter-spacing: 0.03em; }
    #next-prayer-name { font-size: var(--nextName); font-weight: 900; color: var(--accent); text-shadow: 0 0 30px #ffd98c, 0 4px 20px black; line-height: 1.2; max-width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #countdown { font-size: var(--countSize); font-weight: 800; font-variant-numeric: tabular-nums; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255,220,140,0.25); padding: 8px 26px; border-radius: 60px; backdrop-filter: blur(4px); color: #fff5e0; margin: 8px 0 4px; white-space: nowrap; }
    #temp-badge { font-size: var(--badgeSize); color: #fff0ce; font-weight: 600; }

    /* جدول الصلوات */
    #prayer-table-wrap { padding: clamp(10px, 1.5vh, 20px); display: flex; flex-direction: column; gap: 8px; }
    #table-title { display: flex; align-items: center; justify-content: space-between; padding-inline: 10px; color: rgba(255,255,200,0.95); font-weight: 700; font-size: clamp(13px, 1.2vw, 18px); }
    #table-title .dot { width: 8px; height: 8px; border-radius: 50%; background: #ffdcaa; box-shadow: 0 0 22px #ffb347; }

    #prayer-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; table-layout: fixed; }
    #prayer-table colgroup col:nth-child(1) { width: 40%; }
    #prayer-table colgroup col:nth-child(2) { width: 30%; }
    #prayer-table colgroup col:nth-child(3) { width: 30%; }

    #prayer-table th { font-size: clamp(11px, 1.1vw, 15px); color: #fff5d6; font-weight: 700; padding: 8px 4px; text-align: center; opacity: 0.95; }
    #prayer-table td { padding: 12px 8px; text-align: center; background: rgba(0, 0, 0, 0.15); border: 1px solid rgba(255,215,140,0.15); border-radius: 22px; vertical-align: middle; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; backdrop-filter: blur(4px); color: #fff; }
    .prayer-name-ar { font-size: var(--rowName); font-weight: 800; color: #ffffff; line-height: 1.3; }
    .prayer-name-en { font-size: clamp(10px, 1vw, 14px); color: rgba(255, 255, 220, 0.95); direction: ltr; }
    .prayer-time { color: var(--accent); font-weight: 800; font-size: var(--rowTime); font-variant-numeric: tabular-nums; }
    .iqama-time { color: rgba(255, 255, 245, 0.95); font-weight: 700; font-size: var(--rowTime); font-variant-numeric: tabular-nums; }

    tr.is-next td { background: rgba(180, 140, 70, 0.3); border-color: rgba(255, 200, 100, 0.5); box-shadow: 0 0 35px rgba(255,200,100,0.3); }

    /* ===== الشريط السفلي ===== */
    #ticker-wrap { display: flex; align-items: center; gap: 12px; padding-inline: 18px; background: transparent; border: 1px solid rgba(255,220,130,0.15); backdrop-filter: blur(4px) saturate(200%); border-radius: 28px; overflow: hidden; }
    #ticker-icon { width: 10px; height: 10px; background: #ffd78c; border-radius: 50%; box-shadow: 0 0 25px #ffb347; flex-shrink: 0; }
    #ticker-text { display: inline-block; white-space: nowrap; font-size: clamp(14px, 1.6vw, 24px); color: #fffae9; padding-inline: 12px; animation: ticker-scroll-rtl 40s linear infinite; }
    #ticker-text.ltr { animation-name: ticker-scroll-ltr; direction: ltr; }
    #ticker-text.paused { animation-play-state: paused; }
    @keyframes ticker-scroll-rtl { from { transform: translateX(-100%); } to { transform: translateX(100%); } }
    @keyframes ticker-scroll-ltr { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

    /* ===== مؤثر الأذان ===== */
    #adhan-pulse { display: none; position: fixed; inset: 0; z-index: 25; background: radial-gradient(circle at center, rgba(255, 220, 100, 0.15) 0%, transparent 70%); pointer-events: none; animation: soft-pulse 2.2s infinite; }
    @keyframes soft-pulse { 0%{opacity:0.1} 50%{opacity:0.5} 100%{opacity:0.1} }
    body.adhan-active #adhan-pulse, body.iqama-active #adhan-pulse { display: block; }

    /* ===== DEBUG ===== */
    #debug-info { position: fixed; bottom: 8px; left: 8px; background: rgba(0,0,0,0.4); color: #cfc; font-size: 11px; padding: 4px 12px; border-radius: 24px; backdrop-filter: blur(4px); border: 1px solid #afa; z-index: 999; display: none; }
    body.debug-mode #debug-info { display: block; }

    /* تعديل LTR */
    html[dir="ltr"] #header-date { align-items: flex-start; }
    html[dir="ltr"] #city-name { text-align: end; }
  </style>
</head>

<body>
  <div id="bg-full"></div>
  <div id="bg-image"></div>
  <div id="bg-overlay"></div>
  <div id="adhan-pulse"></div>
  <div id="debug-info"></div>

  <div id="app">
    <header id="header" class="glass">
      <div id="city-name">—</div>
      <div id="clock-wrap">
        <span id="time-hm">00:00</span>
        <span id="time-s">:00</span>
      </div>
      <div id="header-date">
        <div id="day-name">—</div>
        <div id="date-line">—</div>
      </div>
    </header>

    <section id="verse-bar" class="glass">
      <div id="verse-badge">آية</div>
      <div id="verse-wrap">
        <span id="verse-text"></span>
      </div>
    </section>

    <div id="main">
      <section id="next-card" class="glass">
        <span id="phase-badge">—</span>
        <div id="next-label">الصلاة القادمة</div>
        <div id="next-prayer-name">—</div>
        <div id="countdown">—</div>
        <div id="temp-badge"></div>
      </section>

      <section id="prayer-table-wrap" class="glass">
        <div id="table-title">
          <span>مواقيت الصلاة</span>
          <span class="dot"></span>
        </div>
        <table id="prayer-table">
          <colgroup><col><col><col></colgroup>
          <thead><tr><th>الصلاة</th><th>الأذان</th><th>الإقامة</th></tr></thead>
          <tbody id="prayer-rows"></tbody>
        </table>
      </section>
    </div>

    <div id="ticker-wrap" class="glass">
      <span id="ticker-icon"></span>
      <span id="ticker-text"></span>
    </div>
  </div>

  <script>
    (function() {
      // ✅ لا توجد بيانات معاينة هنا

      // Debug toggle
      if (window.location.search.includes('debug=1')) {
        document.body.classList.add('debug-mode');
        document.getElementById('debug-info').textContent = 'debug=1';
      }

      // (اختياري) اتركها إن كنت تريد ساعة محلية قبل وصول بيانات السيرفر
      function updateClock() {
        const now = new Date();
        document.getElementById('time-hm').textContent =
          `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        document.getElementById('time-s').textContent =
          `:${String(now.getSeconds()).padStart(2,'0')}`;
      }
      setInterval(updateClock, 500);
      updateClock();

      function updateDateDisplay() {
        const now = new Date();
        document.getElementById('day-name').textContent =
          now.toLocaleDateString('ar-EG', { weekday: 'long' });
        document.getElementById('date-line').textContent =
          now.toLocaleDateString('ar-EG', { year: 'numeric', month: 'long', day: 'numeric' });
      }
      setInterval(updateDateDisplay, 60000);
      updateDateDisplay();

      // ✅ مكانك الطبيعي هنا: fetch("/v1/display") وتعبئة العناصر حسب رد الـ API
      // تركته فارغاً كما طلبت.
    })();
  </script>
</body>
</html>
