<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masjid Display</title>
  <link rel="stylesheet" href="/assets/focusRing.css" />
  <style>
    /* ── Reset & root ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d1117;
      --surface:    #161b22;
      --primary:    #c9a84c;
      --text:       #f0e6d3;
      --text-dim:   #a0927a;
      --accent:     #e8c86d;
      --adhan-glow: #e8c86d;
      --radius:     12px;
      --padding:    clamp(8px, 2vw, 24px);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    /* ── Background layers ────────────────────────────── */
    #bg-gradient {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(160deg, #0d1117 0%, #1a2236 55%, #0d1117 100%);
      transition: background 1s;
    }
    #bg-pattern {
      position: fixed; inset: 0; z-index: 1;
      opacity: 0.06;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    #bg-vignette {
      position: fixed; inset: 0; z-index: 2;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,.65) 100%);
    }
    #bg-image {
      position: fixed; inset: 0; z-index: 1;
      background-size: cover; background-position: center;
      opacity: 0; transition: opacity 1s;
    }

    /* ── Layout ───────────────────────────────────────── */
    #app {
      position: relative; z-index: 10;
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      height: 100vh;
      padding: var(--padding);
      gap: var(--padding);
    }

    /* ── Header: city + date + clock ─────────────────── */
    #header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    #city-name {
      font-size: clamp(14px, 2.2vw, 28px);
      color: var(--text-dim);
      font-weight: 600;
    }
    #clock {
      font-size: clamp(28px, 5vw, 72px);
      font-weight: 700;
      letter-spacing: .04em;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }
    #date-line {
      font-size: clamp(11px, 1.4vw, 18px);
      color: var(--text-dim);
    }

    /* ── Next prayer card ─────────────────────────────── */
    #next-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: clamp(10px, 2vw, 28px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1px solid rgba(201,168,76,.2);
    }
    #phase-badge {
      font-size: clamp(10px, 1.2vw, 14px);
      text-transform: uppercase;
      letter-spacing: .12em;
      padding: 4px 12px;
      border-radius: 999px;
      background: rgba(201,168,76,.15);
      color: var(--primary);
      font-weight: 600;
    }
    #next-label {
      font-size: clamp(11px, 1.3vw, 16px);
      color: var(--text-dim);
    }
    #next-prayer-name {
      font-size: clamp(22px, 4.5vw, 64px);
      font-weight: 700;
      color: var(--accent);
    }
    #countdown {
      font-size: clamp(18px, 3.5vw, 52px);
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }
    #temp-badge {
      font-size: clamp(10px, 1.2vw, 14px);
      color: var(--text-dim);
    }

    /* ── Prayer table ─────────────────────────────────── */
    #prayer-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 4px;
    }
    #prayer-table th {
      font-size: clamp(9px, 1vw, 13px);
      color: var(--text-dim);
      font-weight: 500;
      padding: 4px 8px;
      text-align: center;
    }
    #prayer-table td {
      padding: clamp(4px, 0.8vw, 10px) clamp(6px, 1vw, 14px);
      text-align: center;
      font-size: clamp(12px, 1.6vw, 20px);
      background: var(--surface);
    }
    #prayer-table tr td:first-child { border-radius: var(--radius) 0 0 var(--radius); }
    #prayer-table tr td:last-child  { border-radius: 0 var(--radius) var(--radius) 0; }
    .prayer-name-ar { font-size: clamp(13px, 1.8vw, 22px); font-weight: 600; color: var(--text); }
    .prayer-name-en { font-size: clamp(9px,  1.1vw, 14px); color: var(--text-dim); }
    .prayer-time    { color: var(--accent); font-variant-numeric: tabular-nums; }
    .iqama-time     { color: var(--text-dim); font-size: .85em; }

    /* ── Ticker ───────────────────────────────────────── */
    #ticker-wrap {
      overflow: hidden;
      background: rgba(201,168,76,.08);
      border-radius: var(--radius);
      padding: 6px 0;
      position: relative;
    }
    #ticker-text {
      display: inline-block;
      white-space: nowrap;
      font-size: clamp(12px, 1.8vw, 22px);
      color: var(--primary);
      padding: 0 40px;
      animation: ticker-rtl 30s linear infinite;
    }
    #ticker-text.ltr { animation-name: ticker-ltr; direction: ltr; }
    #ticker-text.paused { animation-play-state: paused; }

    @keyframes ticker-rtl {
      from { transform: translateX(-100%); }
      to   { transform: translateX(100%); }
    }
    @keyframes ticker-ltr {
      from { transform: translateX(100%); }
      to   { transform: translateX(-100%); }
    }

    /* ── Adhan glow overlay ───────────────────────────── */
    #adhan-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 20;
      background: radial-gradient(ellipse at center, rgba(232,200,109,.18) 0%, transparent 70%);
      pointer-events: none;
      animation: pulse-glow 2s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%,100% { opacity: .6; } 50% { opacity: 1; }
    }

    /* Adhan / iqama active states */
    body.adhan-active  #adhan-overlay { display: block; }
    body.adhan-active  #phase-badge   { background: rgba(232,200,109,.35); }
    body.iqama-active  #adhan-overlay { display: block; }
  </style>
</head>
<body>
  <!-- Background layers -->
  <div id="bg-gradient"></div>
  <div id="bg-pattern"></div>
  <div id="bg-vignette"></div>
  <div id="bg-image"></div>
  <div id="adhan-overlay"></div>

  <!-- Main layout -->
  <div id="app">
    <!-- Header -->
    <header id="header">
      <div id="city-name">—</div>
      <div id="clock">00:00:00</div>
      <div id="date-line">—</div>
    </header>

    <!-- Next prayer -->
    <section id="next-card">
      <span id="phase-badge">loading…</span>
      <div id="next-label">الصلاة القادمة</div>
      <div id="next-prayer-name">—</div>
      <div id="countdown">—</div>
      <div id="temp-badge"></div>
    </section>

    <!-- Prayer table -->
    <table id="prayer-table">
      <thead>
        <tr>
          <th>الصلاة</th>
          <th>الأذان</th>
          <th>الإقامة</th>
        </tr>
      </thead>
      <tbody id="prayer-rows"></tbody>
    </table>

    <!-- Ticker -->
    <div id="ticker-wrap">
      <span id="ticker-text">بسم الله الرحمن الرحيم</span>
    </div>
  </div>

  <script src="/assets/focusRing.js"></script>
  <script>
  "use strict";

  // ── Clock ──────────────────────────────────────────────────────────────────
  function tickClock() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, "0");
    const mm = String(now.getMinutes()).padStart(2, "0");
    const ss = String(now.getSeconds()).padStart(2, "0");
    document.getElementById("clock").textContent = `${hh}:${mm}:${ss}`;
  }
  setInterval(tickClock, 1000);
  tickClock();

  // ── Countdown ─────────────────────────────────────────────────────────────
  let _countdownBase = null;   // seconds remaining at last fetch
  let _countdownFetchAt = null; // performance.now() at last fetch

  function renderCountdown() {
    if (_countdownBase === null) return;
    const elapsed = (performance.now() - _countdownFetchAt) / 1000;
    const remaining = Math.max(0, _countdownBase - elapsed);
    const h = Math.floor(remaining / 3600);
    const m = Math.floor((remaining % 3600) / 60);
    const s = Math.floor(remaining % 60);
    let text = h > 0
      ? `${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`
      : `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
    document.getElementById("countdown").textContent = text;
  }
  setInterval(renderCountdown, 500);

  // ── Phase badge map ────────────────────────────────────────────────────────
  const PHASE_LABEL = {
    normal:              "وقت عادي",
    adhan_active:        "وقت الأذان",
    iqama_countdown:     "انتظار الإقامة",
    prayer_in_progress:  "الصلاة جارية",
  };

  // ── Gregorian date ─────────────────────────────────────────────────────────
  function formatDate() {
    return new Date().toLocaleDateString("ar-EG", {
      weekday: "long", year: "numeric", month: "long", day: "numeric"
    });
  }
  function updateDate() {
    document.getElementById("date-line").textContent = formatDate();
  }
  setInterval(updateDate, 60000);
  updateDate();

  // ── Apply theme palette from API ────────────────────────────────────────────
  function applyTheme(theme) {
    if (!theme) return;
    const palette = theme.palette || {};
    const layers  = theme.layerStack || {};
    const root    = document.documentElement;
    if (palette.background)   root.style.setProperty("--bg",      palette.background);
    if (palette.surface)      root.style.setProperty("--surface",  palette.surface);
    if (palette.primary)      root.style.setProperty("--primary",  palette.primary);
    if (palette.accent)       root.style.setProperty("--accent",   palette.accent);
    if (palette.textPrimary)  root.style.setProperty("--text",     palette.textPrimary);
    if (palette.textSecondary)root.style.setProperty("--text-dim", palette.textSecondary);
    if (palette.adhanGlow)    root.style.setProperty("--adhan-glow", palette.adhanGlow);

    // gradient
    if (layers.gradientStops && layers.gradientStops.length) {
      const stops = layers.gradientStops
        .map(s => `${s.color} ${Math.round(s.location * 100)}%`)
        .join(", ");
      const angle = layers.gradientAngle || 160;
      document.getElementById("bg-gradient").style.background =
        `linear-gradient(${angle}deg, ${stops})`;
    }

    // optional background image
    const imgEl = document.getElementById("bg-image");
    const imgUrl = layers.backgroundImageUrl;
    if (imgUrl) {
      imgEl.style.backgroundImage = `url("${imgUrl}")`;
      imgEl.style.opacity = "1";
    } else {
      imgEl.style.opacity = "0";
    }
  }

  // ── Render prayer rows ─────────────────────────────────────────────────────
  function renderPrayers(prayers, nextKey) {
    const tbody = document.getElementById("prayer-rows");
    tbody.innerHTML = "";
    prayers.forEach(p => {
      const tr = document.createElement("tr");
      tr.dataset.prayerKey = p.key;
      tr.innerHTML = `
        <td>
          <div class="prayer-name-ar">${p.nameAr}</div>
          <div class="prayer-name-en">${p.nameEn}</div>
        </td>
        <td class="prayer-time">${p.adhan || "—"}</td>
        <td class="iqama-time">${p.iqama || "—"}</td>
      `;
      tbody.appendChild(tr);
    });
    updateFocusRing(nextKey);
  }

  // ── Fetch /v1/display and render ───────────────────────────────────────────
  async function fetchAndRender() {
    try {
      const resp = await fetch("/v1/display", {
        cache: "no-store",
        headers: { "Cache-Control": "no-store" }
      });
      if (!resp.ok) return;
      const d = await resp.json();

      // City
      document.getElementById("city-name").textContent = d.city || "";

      // Phase
      const phase = d.phase || "normal";
      document.getElementById("phase-badge").textContent =
        PHASE_LABEL[phase] || phase;

      // Body class for glow
      document.body.className = "";
      if (phase === "adhan_active")       document.body.classList.add("adhan-active");
      if (phase === "iqama_countdown")    document.body.classList.add("iqama-active");

      // Next prayer
      document.getElementById("next-prayer-name").textContent =
        d.nextPrayerAr || d.nextPrayerKey || "—";

      // Countdown baseline
      if (d.countdownSeconds !== null && d.countdownSeconds !== undefined) {
        _countdownBase   = d.countdownSeconds;
        _countdownFetchAt = performance.now();
      }

      // Prayers table
      if (d.prayers && d.prayers.length) {
        renderPrayers(d.prayers, d.nextPrayerKey);
      }

      // Ticker
      const tickerEl = document.getElementById("ticker-text");
      const tickerData = d.ticker || {};
      const msg = tickerData.customMessage || "";
      if (msg) tickerEl.textContent = msg;
      tickerEl.className = (d.tickerDirection === "ltr") ? "ltr" : "";
      if (d.tickerPaused && (phase === "adhan_active" || phase === "iqama_countdown")) {
        tickerEl.classList.add("paused");
      }

      // Temperature
      const tempEl = document.getElementById("temp-badge");
      tempEl.textContent = (d.tempC !== null && d.tempC !== undefined)
        ? `${d.tempC}°C` : "";

      // Theme
      applyTheme(d.theme);

    } catch (e) {
      console.warn("fetchAndRender error:", e);
    }
  }

  // Poll every 1.5 seconds
  fetchAndRender();
  setInterval(fetchAndRender, 1500);
  </script>
</body>
</html>
