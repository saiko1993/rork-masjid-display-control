<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masjid Display</title>
  <link rel="stylesheet" href="/assets/focusRing.css" />
  <style>
    /* ── Reset ────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Layout variables – Standard default (4:3 – 16:10) ── */
    :root {
      /* Layout zones */
      --safe:    clamp(10px, 2vw, 28px);
      --topH:    10vh;
      --mainH:   14vh;
      --tableH:  1fr;
      --tickerH: 6vh;

      /* Theme colours */
      --bg:           #0d1117;
      --primary:      #c9a84c;
      --text:         #f0e6d3;
      --text-dim:     #a0927a;
      --accent:       #e8c86d;
      --adhan-glow:   #e8c86d;
      --glass-bg:     rgba(255,255,255,0.03);
      --glass-border: rgba(255,255,255,0.08);
      --radius:       12px;
    }

    /* ── Wide: ≥ 16:10 (covers 1920×1080, 1366×768, 1024×600, 800×480) ── */
    @media (min-aspect-ratio: 16/10) {
      :root {
        --topH:    10vh;
        --mainH:   14vh;
        --tickerH: 6vh;
      }
    }

    /* ── Standard: 4:3 – 16:10 ───────────────────────── */
    @media (min-aspect-ratio: 4/3) and (max-aspect-ratio: 16/10) {
      :root {
        --topH:    10vh;
        --mainH:   14vh;
        --tickerH: 6vh;
      }
    }

    /* ── Portrait / Small: narrower than 4:3 ─────────── */
    @media (max-aspect-ratio: 4/3) {
      :root {
        --safe:    clamp(4px, 1vw, 12px);
        --topH:    10vh;
        --mainH:   14vh;
        --tickerH: 6vh;
      }
    }

    /* ── Base ────────────────────────────────────────── */
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    /* ── Background layers ───────────────────────────── */
    #bg-gradient {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(160deg, #0d1117 0%, #1a2236 55%, #0d1117 100%);
      transition: background 1s;
    }
    #bg-pattern {
      position: fixed; inset: 0; z-index: 1;
      opacity: 0.06;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    #bg-vignette {
      position: fixed; inset: 0; z-index: 2;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,.65) 100%);
      transition: opacity 0.5s;
    }
    #bg-image {
      position: fixed; inset: 0; z-index: 1;
      background-size: cover; background-position: center;
      opacity: 0; transition: opacity 1s;
    }

    /* ── Glass panel mixin ───────────────────────────── */
    .glass {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border-radius: var(--radius);
    }

    /* ── Main 3-zone grid layout ─────────────────────── */
    #app {
      position: relative; z-index: 10;
      display: grid;
      grid-template-rows: var(--mainH) var(--tableH) var(--tickerH);
      height: 100vh;
      padding: var(--safe);
      gap: var(--safe);
    }

    /* ── Top row: TopBar + MainPanel side by side ─────── */
    #top-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--safe);
    }

    /* ── TopBar: clock · city · date ─────────────────── */
    #header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: nowrap;
      gap: clamp(6px, 1vw, 16px);
      padding: 0 clamp(10px, 1.5vw, 20px);
      overflow: hidden;
    }
    #city-name {
      font-size: clamp(12px, 1.6vw, 22px);
      color: var(--text-dim);
      font-weight: 600;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #clock {
      font-size: clamp(40px, 6vw, 96px);
      font-weight: 700;
      letter-spacing: .04em;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #date-line {
      font-size: clamp(10px, 1.1vw, 15px);
      color: var(--text-dim);
      flex: 1;
      text-align: start;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── MainPanel: next prayer + countdown ──────────── */
    #next-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(2px, 0.4vh, 6px);
      padding: 0 clamp(10px, 2vw, 28px);
      overflow: hidden;
    }
    #phase-badge {
      font-size: clamp(9px, 0.9vw, 13px);
      text-transform: uppercase;
      letter-spacing: .12em;
      padding: 3px 10px;
      border-radius: 999px;
      background: rgba(201,168,76,.15);
      color: var(--primary);
      font-weight: 600;
      white-space: nowrap;
    }
    #next-label {
      font-size: clamp(10px, 1vw, 14px);
      color: var(--text-dim);
    }
    #next-prayer-name {
      font-size: clamp(36px, 4vw, 72px);
      font-weight: 700;
      color: var(--accent);
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 90%;
      text-align: center;
    }
    #countdown {
      font-size: clamp(28px, 3vw, 56px);
      font-variant-numeric: tabular-nums;
      color: var(--text);
      white-space: nowrap;
    }
    #temp-badge {
      font-size: clamp(9px, 0.9vw, 13px);
      color: var(--text-dim);
    }

    /* ── PrayerTable wrapper ─────────────────────────── */
    #prayer-table-wrap {
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: clamp(4px, 0.6vh, 10px) clamp(6px, 1vw, 14px);
    }

    /* ── PrayerTable ─────────────────────────────────── */
    #prayer-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 clamp(2px, 0.35vh, 5px);
      table-layout: fixed;
      flex: 1;
    }
    #prayer-table th {
      font-size: clamp(9px, 0.9vw, 13px);
      color: var(--text-dim);
      font-weight: 500;
      padding: clamp(2px, 0.4vh, 5px) 8px;
      text-align: center;
    }
    #prayer-table td {
      padding: clamp(5px, 0.9vh, 13px) clamp(6px, 1vw, 14px);
      text-align: center;
      font-size: clamp(13px, 1.7vw, 22px);
      background: rgba(255,255,255,0.05);
      border-top: 1px solid rgba(255,255,255,0.07);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      vertical-align: middle;
    }
    /* Use logical properties so RTL/LTR outer borders are automatic */
    #prayer-table tr td:first-child {
      border-inline-start: 1px solid rgba(255,255,255,0.07);
      border-start-start-radius: var(--radius);
      border-end-start-radius: var(--radius);
    }
    #prayer-table tr td:last-child {
      border-inline-end: 1px solid rgba(255,255,255,0.07);
      border-start-end-radius: var(--radius);
      border-end-end-radius: var(--radius);
    }
    .prayer-name-ar {
      font-size: clamp(20px, 2vw, 32px);
      font-weight: 700;
      color: var(--text);
      direction: rtl;
      line-height: 1.2;
    }
    .prayer-name-en {
      font-size: clamp(9px, 0.9vw, 13px);
      color: var(--text-dim);
      direction: ltr;
    }
    .prayer-time {
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      font-size: clamp(18px, 2vw, 30px);
      font-weight: 600;
    }
    .iqama-time {
      color: var(--text-dim);
      font-size: clamp(18px, 2vw, 30px);
    }

    /* ── TickerBar ───────────────────────────────────── */
    #ticker-wrap {
      position: relative;
      overflow: hidden;
      background: rgba(201,168,76,.08);
      border: 1px solid rgba(201,168,76,.2);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      z-index: 15;
      grid-row: 3;
    }
    #ticker-text {
      display: inline-block;
      white-space: nowrap;
      font-size: clamp(12px, 1.5vw, 20px);
      color: var(--primary);
      padding: 0 40px;
      animation: ticker-scroll-rtl 30s linear infinite;
    }
    #ticker-text.ltr {
      animation-name: ticker-scroll-ltr;
      direction: ltr;
    }
    #ticker-text.paused {
      animation-play-state: paused;
    }
    /* RTL: enter from left, scroll right */
    @keyframes ticker-scroll-rtl {
      from { transform: translateX(-100%); }
      to   { transform: translateX(100%); }
    }
    /* LTR: enter from right, scroll left */
    @keyframes ticker-scroll-ltr {
      from { transform: translateX(100%); }
      to   { transform: translateX(-100%); }
    }

    /* ── Adhan glow overlay ──────────────────────────── */
    #adhan-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 20;
      background: radial-gradient(ellipse at center, rgba(232,200,109,.18) 0%, transparent 70%);
      pointer-events: none;
      animation: pulse-glow 2s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%,100% { opacity: .6; } 50% { opacity: 1; }
    }
    body.adhan-active  #adhan-overlay { display: block; }
    body.adhan-active  #phase-badge   { background: rgba(232,200,109,.35); }
    body.iqama-active  #adhan-overlay { display: block; }

    /* ── Debug mode ──────────────────────────────────── */
    #debug-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 1000;
      pointer-events: none;
    }
    body.debug-mode #debug-overlay  { display: block; }
    body.debug-mode #top-row        { outline: 2px solid rgba(255,165,0,0.8); }
    body.debug-mode #header         { outline: 2px solid rgba(255,80,80,0.8); }
    body.debug-mode #next-card      { outline: 2px solid rgba(80,255,80,0.8); }
    body.debug-mode #prayer-table-wrap { outline: 2px solid rgba(80,160,255,0.8); }
    body.debug-mode #ticker-wrap    { outline: 2px solid rgba(255,255,80,0.8); }
    #debug-info {
      position: absolute;
      top: 8px;
      inset-inline-start: 8px;
      background: rgba(0,0,0,0.85);
      border: 1px solid #0f0;
      padding: 8px 12px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 12px;
      color: #0f0;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <!-- Background layers -->
  <div id="bg-gradient"></div>
  <div id="bg-pattern"></div>
  <div id="bg-vignette"></div>
  <div id="bg-image"></div>
  <div id="adhan-overlay"></div>

  <!-- Debug overlay (visible only when ?debug=1) -->
  <div id="debug-overlay">
    <div id="debug-info">…</div>
  </div>

  <!-- 3-zone grid layout -->
  <div id="app">

    <!-- Zone 1: TopBar + MainPanel (side by side) -->
    <div id="top-row">

      <!-- TopBar: clock · city · date -->
      <header id="header" class="glass">
        <div id="city-name">—</div>
        <div id="clock">00:00:00</div>
        <div id="date-line">—</div>
      </header>

      <!-- MainPanel – next prayer + countdown -->
      <section id="next-card" class="glass">
        <span id="phase-badge">loading…</span>
        <div id="next-label">الصلاة القادمة</div>
        <div id="next-prayer-name">—</div>
        <div id="countdown">—</div>
        <div id="temp-badge"></div>
      </section>

    </div><!-- #top-row -->

    <!-- Zone 3: PrayerTable -->
    <div id="prayer-table-wrap" class="glass">
      <table id="prayer-table">
        <thead>
          <tr>
            <th>الصلاة</th>
            <th>الأذان</th>
            <th>الإقامة</th>
          </tr>
        </thead>
        <tbody id="prayer-rows"></tbody>
      </table>
    </div>

    <!-- Zone 4: TickerBar (always rendered) -->
    <div id="ticker-wrap">
      <span id="ticker-text">بسم الله الرحمن الرحيم</span>
    </div>

  </div><!-- #app -->

  <script src="/assets/focusRing.js"></script>
  <script>
  "use strict";

  // ── Debug mode ─────────────────────────────────────────────────────────────
  const IS_DEBUG = new URLSearchParams(window.location.search).get("debug") === "1";
  if (IS_DEBUG) document.body.classList.add("debug-mode");

  function updateDebugInfo(payload) {
    if (!IS_DEBUG) return;
    const header   = document.getElementById("header");
    const nextCard = document.getElementById("next-card");
    const tableWrap = document.getElementById("prayer-table-wrap");
    const ticker   = document.getElementById("ticker-wrap");
    const aspectRatio = window.innerWidth / window.innerHeight;
    const profile = aspectRatio >= 1.6   ? "Wide (≥16:10)"
                  : aspectRatio >= 1.333 ? "Standard (4:3–16:10)"
                                         : "Portrait/Small (<4:3)";
    const tickerData = payload ? (payload.ticker || {}) : {};
    const phase = payload ? (payload.phase || "normal") : "—";
    const paused = (tickerData.pauseDuringAdhan || (payload && payload.tickerPaused)) &&
                   (phase === "adhan_active" || phase === "iqama_countdown");
    document.getElementById("debug-info").innerHTML = [
      `Profile: ${profile} (${window.innerWidth}×${window.innerHeight}, AR ${aspectRatio.toFixed(2)})`,
      `TopBar:  ${header.offsetHeight}px`,
      `Main:    ${nextCard.offsetHeight}px`,
      `Table:   ${tableWrap.offsetHeight}px`,
      `Ticker:  ${ticker.offsetHeight}px`,
      `Phase:   ${phase}`,
      `Ticker paused: ${paused ? "YES" : "no"}`,
      `Msg: ${tickerData.customMessage || "(default)"}`,
    ].join("<br>");
  }

  // ── Clock ──────────────────────────────────────────────────────────────────
  function tickClock() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, "0");
    const mm = String(now.getMinutes()).padStart(2, "0");
    const ss = String(now.getSeconds()).padStart(2, "0");
    document.getElementById("clock").textContent = `${hh}:${mm}:${ss}`;
  }
  setInterval(tickClock, 1000);
  tickClock();

  // ── Countdown ─────────────────────────────────────────────────────────────
  let _countdownBase   = null;  // seconds remaining at last fetch
  let _countdownFetchAt = null; // performance.now() at last fetch

  function renderCountdown() {
    if (_countdownBase === null) return;
    const elapsed   = (performance.now() - _countdownFetchAt) / 1000;
    const remaining = Math.max(0, _countdownBase - elapsed);
    const h = Math.floor(remaining / 3600);
    const m = Math.floor((remaining % 3600) / 60);
    const s = Math.floor(remaining % 60);
    const formattedTime = h > 0
      ? `${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`
      : `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
    document.getElementById("countdown").textContent = formattedTime;
  }
  setInterval(renderCountdown, 500);

  // ── Phase label map ────────────────────────────────────────────────────────
  const PHASE_LABEL = {
    normal:              "وقت عادي",
    adhan_active:        "وقت الأذان",
    iqama_countdown:     "انتظار الإقامة",
    prayer_in_progress:  "الصلاة جارية",
  };

  // ── Date line ─────────────────────────────────────────────────────────────
  function updateDate() {
    document.getElementById("date-line").textContent =
      new Date().toLocaleDateString("ar-EG", {
        weekday: "long", year: "numeric", month: "long", day: "numeric"
      });
  }
  setInterval(updateDate, 60000);
  updateDate();

  // ── Apply theme from API ───────────────────────────────────────────────────
  function applyTheme(theme) {
    if (!theme) return;
    const palette = theme.palette || {};
    const layers  = theme.layerStack || {};
    const root    = document.documentElement;

    if (palette.background)    root.style.setProperty("--bg",          palette.background);
    if (palette.primary)       root.style.setProperty("--primary",     palette.primary);
    if (palette.accent)        root.style.setProperty("--accent",      palette.accent);
    if (palette.textPrimary)   root.style.setProperty("--text",        palette.textPrimary);
    if (palette.textSecondary) root.style.setProperty("--text-dim",    palette.textSecondary);
    if (palette.adhanGlow)     root.style.setProperty("--adhan-glow",  palette.adhanGlow);

    // Gradient background
    if (layers.gradientStops && layers.gradientStops.length) {
      const stops = layers.gradientStops
        .map(s => `${s.color} ${Math.round(s.location * 100)}%`)
        .join(", ");
      document.getElementById("bg-gradient").style.background =
        `linear-gradient(${layers.gradientAngle || 160}deg, ${stops})`;
    }

    // Optional image/video background
    const imgEl  = document.getElementById("bg-image");
    const imgUrl = layers.backgroundImageUrl;
    if (imgUrl) {
      imgEl.style.backgroundImage = `url("${imgUrl}")`;
      imgEl.style.opacity = "1";
    } else {
      imgEl.style.opacity = "0";
    }

    // Pattern opacity
    if (layers.patternOpacity !== undefined) {
      document.getElementById("bg-pattern").style.opacity = layers.patternOpacity;
    }

    // Vignette toggle
    document.getElementById("bg-vignette").style.opacity =
      (layers.vignette === false) ? "0" : "1";
  }

  // ── Render prayer rows ─────────────────────────────────────────────────────
  function renderPrayers(prayers, nextKey) {
    const tbody = document.getElementById("prayer-rows");
    tbody.innerHTML = "";
    prayers.forEach(p => {
      const tr = document.createElement("tr");
      tr.dataset.prayerKey = p.key;
      tr.innerHTML = `
        <td>
          <div class="prayer-name-ar">${p.nameAr}</div>
          <div class="prayer-name-en">${p.nameEn}</div>
        </td>
        <td class="prayer-time">${p.adhan || "—"}</td>
        <td class="iqama-time">${p.iqama || "—"}</td>
      `;
      tbody.appendChild(tr);
    });
    updateFocusRing(nextKey);
  }

  // ── Last payload (used by debug overlay) ──────────────────────────────────
  let _lastPayload = null;

  // ── Fetch /v1/display and render ───────────────────────────────────────────
  async function fetchAndRender() {
    try {
      const resp = await fetch("/v1/display", {
        cache: "no-store",
        headers: { "Cache-Control": "no-store" }
      });
      if (!resp.ok) return;
      const d = await resp.json();
      _lastPayload = d;

      // City
      document.getElementById("city-name").textContent = d.city || "";

      // Phase
      const phase = d.phase || "normal";
      document.getElementById("phase-badge").textContent =
        PHASE_LABEL[phase] || phase;

      // Body classes (preserve debug-mode if set)
      document.body.className = IS_DEBUG ? "debug-mode" : "";
      if (phase === "adhan_active")    document.body.classList.add("adhan-active");
      if (phase === "iqama_countdown") document.body.classList.add("iqama-active");

      // Next prayer name
      document.getElementById("next-prayer-name").textContent =
        d.nextPrayerAr || d.nextPrayerKey || "—";

      // Countdown baseline
      if (d.countdownSeconds != null) {
        _countdownBase    = d.countdownSeconds;
        _countdownFetchAt = performance.now();
      }

      // Prayer table
      if (d.prayers && d.prayers.length) {
        renderPrayers(d.prayers, d.nextPrayerKey);
      }

      // Ticker – always rendered; pause freezes animation but keeps bar visible
      const tickerEl   = document.getElementById("ticker-text");
      const tickerData = d.ticker || {};
      const msg = tickerData.customMessage || "";
      if (msg) tickerEl.textContent = msg;

      const isLtr = (tickerData.direction === "ltr") || (d.tickerDirection === "ltr");
      tickerEl.className = isLtr ? "ltr" : "";

      const shouldPause = (tickerData.pauseDuringAdhan || d.tickerPaused) &&
                          (phase === "adhan_active" || phase === "iqama_countdown");
      if (shouldPause) tickerEl.classList.add("paused");

      // Temperature
      const tempEl = document.getElementById("temp-badge");
      tempEl.textContent = (d.tempC != null) ? `${d.tempC}°C` : "";

      // Theme
      applyTheme(d.theme);

      // Debug
      updateDebugInfo(d);

    } catch (e) {
      console.warn("fetchAndRender error:", e);
    }
  }

  // Poll every 1.5 s with no-store
  fetchAndRender();
  setInterval(fetchAndRender, 1500);

  // Debug: refresh overlay on window resize
  if (IS_DEBUG) {
    window.addEventListener("resize", () => updateDebugInfo(_lastPayload));
    updateDebugInfo(null);
  }
  </script>
</body>
</html>
